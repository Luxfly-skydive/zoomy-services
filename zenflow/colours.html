<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zenflow — Brand Colours</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--surf:#0d0d1e;--card:#0f0f22;--ac:#0ea5e9;--text:#e8e8f4;--muted:#8892a4;--border:rgba(255,255,255,.07)}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;}
a{color:inherit;text-decoration:none}
.swatch{width:44px;height:44px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.swatch:hover{transform:scale(1.12);border-color:rgba(255,255,255,.4);}
.swatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(14,165,233,.5);}
label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:.35rem;}
input[type=color]{width:44px;height:44px;border:none;border-radius:10px;cursor:pointer;padding:2px;background:transparent;}
input[type=text]{width:100%;background:#0d0d1e;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.85rem;outline:none;}
input[type=text]:focus{border-color:var(--ac);}
.preview-btn{display:inline-block;padding:.55rem 1.4rem;border-radius:8px;font-size:.85rem;font-weight:700;}
</style></head>
<body>
<nav style="background:rgba(7,7,15,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;">
  <a href="home.html" style="font-family:'Montserrat',sans-serif;font-size:1.3rem;font-weight:900;color:#0ea5e9;letter-spacing:-.02em;">⚡ ZENFLOW</a>
  <div style="display:flex;gap:1.75rem;align-items:center;">
    <a href="home.html" style="color:#8892a4;font-size:.875rem;">Home</a><a href="classes.html" style="color:#8892a4;font-size:.875rem;">Classes</a><a href="trainers.html" style="color:#8892a4;font-size:.875rem;">Trainers</a><a href="pricing.html" style="color:#8892a4;font-size:.875rem;">Pricing</a><a href="contact.html" style="color:#8892a4;font-size:.875rem;">Contact</a>
    <a href="pricing.html" style="background:#0ea5e9;color:#fff;padding:.5rem 1.2rem;border-radius:8px;font-size:.83rem;font-weight:700;">Join Now →</a>
  </div>
</nav>

<div style="max-width:800px;margin:3rem auto;padding:0 2rem;">
  <div style="margin-bottom:2rem;">
    <div style="font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ac);margin-bottom:.5rem;">Brand Settings</div>
    <h1 style="font-family:'Montserrat',sans-serif;font-size:1.9rem;font-weight:900;">Brand Colours</h1>
    <p style="color:var(--muted);margin-top:.5rem;font-size:.9rem;">Customise your site's primary colour. Changes apply across all pages instantly.</p>
  </div>

  <!-- Presets -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="font-size:.82rem;font-weight:600;margin-bottom:1rem;">Quick Presets</div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;">
      <div class="swatch active" style="background:#0ea5e9;" title="Sky Blue"></div>
      <div class="swatch" style="background:#8b5cf6;" title="Violet"></div>
      <div class="swatch" style="background:#f59e0b;" title="Amber"></div>
      <div class="swatch" style="background:#10b981;" title="Emerald"></div>
      <div class="swatch" style="background:#ef4444;" title="Red"></div>
      <div class="swatch" style="background:#ec4899;" title="Pink"></div>
      <div class="swatch" style="background:#f97316;" title="Orange"></div>
      <div class="swatch" style="background:#14b8a6;" title="Teal"></div>
    </div>
  </div>

  <!-- Custom picker -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="font-size:.82rem;font-weight:600;margin-bottom:1rem;">Custom Colour</div>
    <div style="display:flex;gap:1rem;align-items:flex-end;">
      <div>
        <label>Colour picker</label>
        <input type="color" value="#0ea5e9">
      </div>
      <div style="flex:1;">
        <label>Hex value</label>
        <input type="text" value="#0ea5e9" placeholder="#000000">
      </div>
      <button style="background:var(--ac);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;">Apply</button>
    </div>
  </div>

  <!-- Preview -->
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="font-size:.82rem;font-weight:600;margin-bottom:1rem;">Live Preview</div>
    <div style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
      <span class="preview-btn" style="background:#0ea5e9;color:#fff;">Primary Button</span>
      <span class="preview-btn" style="background:transparent;border:1.5px solid #0ea5e9;color:#0ea5e9;">Outline Button</span>
      <span style="color:#0ea5e9;font-weight:600;font-size:.9rem;">Link colour</span>
      <div style="width:32px;height:32px;border-radius:50%;background:#0ea5e9;"></div>
    </div>
  </div>

  <div style="display:flex;justify-content:flex-end;">
    <button style="background:var(--ac);color:#fff;border:none;border-radius:10px;padding:11px 32px;font-size:.88rem;font-weight:700;cursor:pointer;letter-spacing:.02em;">Save Changes ↑</button>
  </div>
</div>
</body></html>
